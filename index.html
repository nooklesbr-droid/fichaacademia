<!DOCTYPE html><html lang="pt-BR"><head>  <meta charset="UTF-8" />  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <title>Treino ABC</title>  <link rel="stylesheet" href="styles.css" /></head><body>  <main class="app">    <header class="hero">      <p class="eyebrow">Controle de treino</p>      <h1>Treino ABC</h1>      <p class="subtitle">Marque as sťries feitas e acompanhe o descanso de 3 minutos.</p>    </header>    <section class="timer-card">      <div>        <span class="timer-label">Descanso</span>        <strong id="timerDisplay">03:00</strong>      </div>      <div class="timer-actions">        <button id="pauseTimerBtn" class="small-btn" type="button">Pausar</button>        <button id="resetTimerBtn" class="small-btn ghost" type="button">Reset</button>      </div>    </section>    <nav class="tabs" aria-label="Selecionar treino">      <button class="tab active" data-workout="A" type="button">Treino A</button>      <button class="tab" data-workout="B" type="button">Treino B</button>      <button class="tab" data-workout="C" type="button">Treino C</button>    </nav>    <section class="progress-card">      <div class="progress-row">        <span id="workoutTitle">Treino A</span>        <strong id="progressText">0%</strong>      </div>      <div class="progress-bar">        <div id="progressFill"></div>      </div>    </section>    <section id="workoutContainer" class="workout"></section>    <footer class="footer-actions">      <button id="resetCurrentBtn" class="danger-btn" type="button">Resetar treino atual</button>      <button id="resetAllBtn" class="danger-btn outline" type="button">Limpar tudo</button>    </footer>  </main>  <script src="script.js"></script></body></html>
